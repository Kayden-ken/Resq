<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ - Emergency Response Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar { width: 250px; }
        .main-content { margin-left: 250px; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-red-500"><i class="fas fa-shield-heart"></i> ResQ</h1>
                <p class="text-gray-600 mt-2">Admin Login</p>
            </div>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    <input type="email" id="login-email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input type="password" id="login-password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" required>
                </div>
                <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">
                    Login
                </button>
            </form>
            <div class="mt-4 text-center text-sm text-gray-500">
                <p>Demo: admin@resq.local / password</p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden flex min-h-screen">
        <!-- Sidebar -->
        <aside class="sidebar fixed h-full bg-slate-800 text-white p-4">
            <div class="mb-6">
                <h1 class="text-2xl font-bold"><i class="fas fa-shield-heart text-red-500"></i> ResQ</h1>
                <p class="text-sm text-gray-400">Emergency Response</p>
            </div>
            <nav class="space-y-2" id="nav-menu">
                <a href="#" onclick="showPage('dashboard')" class="block py-2 px-4 rounded hover:bg-slate-700 nav-item" data-page="dashboard">
                    <i class="fas fa-home w-6"></i> Dashboard
                </a>
                <a href="#" onclick="showPage('requests')" class="block py-2 px-4 rounded hover:bg-slate-700 nav-item" data-page="requests">
                    <i class="fas fa-exclamation-triangle w-6"></i> Emergency Requests
                </a>
                <a href="#" onclick="showPage('users')" class="block py-2 px-4 rounded hover:bg-slate-700 nav-item" data-page="users">
                    <i class="fas fa-users w-6"></i> Users
                </a>
                <a href="#" onclick="showPage('responders')" class="block py-2 px-4 rounded hover:bg-slate-700 nav-item" data-page="responders">
                    <i class="fas fa-ambulance w-6"></i> Responders
                </a>
                <a href="#" onclick="showPage('reports')" class="block py-2 px-4 rounded hover:bg-slate-700 nav-item" data-page="reports">
                    <i class="fas fa-chart-bar w-6"></i> Reports
                </a>
                <a href="#" onclick="showPage('audit')" class="block py-2 px-4 rounded hover:bg-slate-700 nav-item" data-page="audit">
                    <i class="fas fa-history w-6"></i> Audit Logs
                </a>
            </nav>
            <div class="absolute bottom-4 left-4 right-4">
                <button onclick="logout()" class="w-full py-2 px-4 bg-red-600 hover:bg-red-700 rounded">
                    <i class="fas fa-sign-out-alt w-6"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content p-6" id="main-content">
            <!-- Content will be loaded here -->
        </main>
    </div>

    <script>
        let token = localStorage.getItem('resq_token') || '';
        let currentUser = null;

        // Check login status on load
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                checkAuth();
            }
        });

        // Login form
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch('api/auth.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();

                if (result.success) {
                    token = result.data.token;
                    currentUser = result.data.user;
                    localStorage.setItem('resq_token', token);
                    localStorage.setItem('resq_user', JSON.stringify(currentUser));
                    showApp();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });

        async function checkAuth() {
            try {
                const response = await fetch('api/auth.php?action=user', {
                    headers: { 'Authorization': token }
                });
                const result = await response.json();

                if (result.success) {
                    currentUser = result.data;
                    showApp();
                } else {
                    showLogin();
                }
            } catch (error) {
                showLogin();
            }
        }

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            showPage('dashboard');
        }

        function showLogin() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
            localStorage.removeItem('resq_token');
            localStorage.removeItem('resq_user');
            token = '';
        }

        function logout() {
            showLogin();
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
        }

        function showPage(page) {
            // Update nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('bg-slate-700');
                if (item.dataset.page === page) {
                    item.classList.add('bg-slate-700');
                }
            });

            // Load page content
            switch(page) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'requests':
                    loadRequests();
                    break;
                case 'users':
                    loadUsers();
                    break;
                case 'responders':
                    loadResponders();
                    break;
                case 'reports':
                    loadReports();
                    break;
                case 'audit':
                    loadAuditLogs();
                    break;
            }
        }

        async function loadDashboard() {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></div>';

            try {
                const response = await fetch('api/admin.php?action=dashboard', {
                    headers: { 'Authorization': token }
                });
                const result = await response.json();

                if (!result.success) {
                    main.innerHTML = '<p class="text-red-500">Failed to load dashboard</p>';
                    return;
                }

                const stats = result.data.stats;
                const recentRequests = result.data.recent_requests;

                main.innerHTML = `
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
                        <p class="text-gray-600">Emergency Response System Overview</p>
                    </div>

                    <!-- Stats Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div class="bg-white rounded-lg shadow p-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">Total Requests</p>
                                    <p class="text-2xl font-bold text-gray-800">${stats.total_requests}</p>
                                </div>
                                <div class="bg-blue-100 p-3 rounded-full">
                                    <i class="fas fa-exclamation-triangle text-blue-500 text-xl"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-lg shadow p-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">Pending</p>
                                    <p class="text-2xl font-bold text-yellow-600">${stats.pending_requests}</p>
                                </div>
                                <div class="bg-yellow-100 p-3 rounded-full">
                                    <i class="fas fa-clock text-yellow-500 text-xl"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-lg shadow p-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">Active</p>
                                    <p class="text-2xl font-bold text-red-600">${stats.active_requests}</p>
                                </div>
                                <div class="bg-red-100 p-3 rounded-full">
                                    <i class="fas fa-ambulance text-red-500 text-xl"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-lg shadow p-4">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">Completed Today</p>
                                    <p class="text-2xl font-bold text-green-600">${stats.completed_today}</p>
                                </div>
                                <div class="bg-green-100 p-3 rounded-full">
                                    <i class="fas fa-check-circle text-green-500 text-xl"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Additional Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div class="bg-white rounded-lg shadow p-4">
                            <p class="text-sm text-gray-500">Total Users</p>
                            <p class="text-2xl font-bold text-gray-800">${stats.total_users}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow p-4">
                            <p class="text-sm text-gray-500">Total Responders</p>
                            <p class="text-2xl font-bold text-gray-800">${stats.total_responders}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow p-4">
                            <p class="text-sm text-gray-500">Available Responders</p>
                            <p class="text-2xl font-bold text-green-600">${stats.available_responders}</p>
                        </div>
                    </div>

                    <!-- Recent Requests -->
                    <div class="bg-white rounded-lg shadow p-4">
                        <h2 class="text-lg font-bold mb-4">Recent Emergency Requests</h2>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="border-b">
                                        <th class="text-left py-2">Incident #</th>
                                        <th class="text-left py-2">Type</th>
                                        <th class="text-left py-2">Requester</th>
                                        <th class="text-left py-2">Status</th>
                                        <th class="text-left py-2">Date</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${recentRequests.length > 0 ? recentRequests.map(r => `
                                        <tr class="border-b hover:bg-gray-50">
                                            <td class="py-2">${r.incident_number}</td>
                                            <td class="py-2">${r.type_name || 'Unknown'}</td>
                                            <td class="py-2">${r.requester_name || 'N/A'}</td>
                                            <td class="py-2">
                                                <span class="px-2 py-1 rounded text-xs ${getStatusClass(r.status)}">${r.status}</span>
                                            </td>
                                            <td class="py-2 text-gray-500">${new Date(r.created_at).toLocaleString()}</td>
                                        </tr>
                                    `).join('') : '<tr><td colspan="5" class="py-4 text-center text-gray-500">No requests</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            } catch (error) {
                main.innerHTML = '<p class="text-red-500">Error: ' + error.message + '</p>';
            }
        }

        async function loadRequests() {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></div>';

            try {
                const response = await fetch('api/admin.php?action=requests', {
                    headers: { 'Authorization': token }
                });
                const result = await response.json();

                if (!result.success) {
                    main.innerHTML = '<p class="text-red-500">Failed to load requests</p>';
                    return;
                }

                const requests = result.data;

                main.innerHTML = `
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">Emergency Requests</h1>
                        <p class="text-gray-600">Manage all emergency incidents</p>
                    </div>

                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="text-left py-3 px-4">Incident #</th>
                                    <th class="text-left py-3 px-4">Type</th>
                                    <th class="text-left py-3 px-4">Requester</th>
                                    <th class="text-left py-3 px-4">Location</th>
                                    <th class="text-left py-3 px-4">Status</th>
                                    <th class="text-left py-3 px-4">Date</th>
                                    <th class="text-left py-3 px-4">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${requests.length > 0 ? requests.map(r => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="py-3 px-4 font-medium">${r.incident_number}</td>
                                        <td class="py-3 px-4">${r.type_name || 'Unknown'}</td>
                                        <td class="py-3 px-4">${r.requester_name || 'N/A'}</td>
                                        <td class="py-3 px-4 text-gray-500 truncate max-w-[150px]">${r.address || 'N/A'}</td>
                                        <td class="py-3 px-4">
                                            <span class="px-2 py-1 rounded text-xs ${getStatusClass(r.status)}">${r.status}</span>
                                        </td>
                                        <td class="py-3 px-4 text-gray-500">${new Date(r.created_at).toLocaleDateString()}</td>
                                        <td class="py-3 px-4">
                                            <button onclick="viewRequest(${r.id})" class="text-blue-500 hover:underline">View</button>
                                        </td>
                                    </tr>
                                `).join('') : '<tr><td colspan="7" class="py-8 text-center text-gray-500">No requests found</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                main.innerHTML = '<p class="text-red-500">Error: ' + error.message + '</p>';
            }
        }

        async function loadUsers() {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></div>';

            try {
                const response = await fetch('api/admin.php?action=users', {
                    headers: { 'Authorization': token }
                });
                const result = await response.json();

                if (!result.success) {
                    main.innerHTML = '<p class="text-red-500">Failed to load users</p>';
                    return;
                }

                const users = result.data;

                main.innerHTML = `
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">Users</h1>
                        <p class="text-gray-600">Manage all registered users</p>
                    </div>

                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="text-left py-3 px-4">Name</th>
                                    <th class="text-left py-3 px-4">Email</th>
                                    <th class="text-left py-3 px-4">Phone</th>
                                    <th class="text-left py-3 px-4">Type</th>
                                    <th class="text-left py-3 px-4">Status</th>
                                    <th class="text-left py-3 px-4">Joined</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${users.length > 0 ? users.map(u => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="py-3 px-4 font-medium">${u.name}</td>
                                        <td class="py-3 px-4 text-gray-600">${u.email}</td>
                                        <td class="py-3 px-4 text-gray-600">${u.phone || 'N/A'}</td>
                                        <td class="py-3 px-4">
                                            <span class="px-2 py-1 rounded text-xs ${getUserTypeClass(u.user_type)}">${u.user_type}</span>
                                        </td>
                                        <td class="py-3 px-4">
                                            <span class="px-2 py-1 rounded text-xs ${u.is_active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${u.is_active ? 'Active' : 'Inactive'}</span>
                                        </td>
                                        <td class="py-3 px-4 text-gray-500">${new Date(u.created_at).toLocaleDateString()}</td>
                                    </tr>
                                `).join('') : '<tr><td colspan="6" class="py-8 text-center text-gray-500">No users found</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                main.innerHTML = '<p class="text-red-500">Error: ' + error.message + '</p>';
            }
        }

        async function loadResponders() {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></div>';

            try {
                const response = await fetch('api/admin.php?action=responders', {
                    headers: { 'Authorization': token }
                });
                const result = await response.json();

                if (!result.success) {
                    main.innerHTML = '<p class="text-red-500">Failed to load responders</p>';
                    return;
                }

                const responders = result.data;

                main.innerHTML = `
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">Emergency Responders</h1>
                        <p class="text-gray-600">Manage responders and agencies</p>
                    </div>

                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="text-left py-3 px-4">Responder</th>
                                    <th class="text-left py-3 px-4">Email</th>
                                    <th class="text-left py-3 px-4">Agency</th>
                                    <th class="text-left py-3 px-4">Badge #</th>
                                    <th class="text-left py-3 px-4">Status</th>
                                    <th class="text-left py-3 px-4">Vehicle</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${responders.length > 0 ? responders.map(r => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="py-3 px-4 font-medium">${r.user_name || 'N/A'}</td>
                                        <td class="py-3 px-4 text-gray-600">${r.user_email || 'N/A'}</td>
                                        <td class="py-3 px-4">${r.agency_name || 'N/A'}</td>
                                        <td class="py-3 px-4 text-gray-600">${r.badge_number || 'N/A'}</td>
                                        <td class="py-3 px-4">
                                            <span class="px-2 py-1 rounded text-xs ${getResponderStatusClass(r.status)}">${r.status}</span>
                                        </td>
                                        <td class="py-3 px-4 text-gray-600">${r.vehicle_info || 'N/A'}</td>
                                    </tr>
                                `).join('') : '<tr><td colspan="6" class="py-8 text-center text-gray-500">No responders found</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                main.innerHTML = '<p class="text-red-500">Error: ' + error.message + '</p>';
            }
        }

        async function loadReports() {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></div>';

            try {
                const response = await fetch('api/admin.php?action=reports', {
                    headers: { 'Authorization': token }
                });
                const result = await response.json();

                if (!result.success) {
                    main.innerHTML = '<p class="text-red-500">Failed to load reports</p>';
                    return;
                }

                const data = result.data;

                main.innerHTML = `
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">Reports & Analytics</h1>
                        <p class="text-gray-600">System performance and incident analysis</p>
                    </div>

                    <!-- Summary Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div class="bg-white rounded-lg shadow p-4">
                            <p class="text-sm text-gray-500">Total Incidents (Last 30 days)</p>
                            <p class="text-3xl font-bold text-gray-800">${data.total_requests}</p>
                        </div>
                        <div class="bg-white rounded-lg shadow p-4">
                            <p class="text-sm text-gray-500">Status Distribution</p>
                            <div class="mt-2 space-y-1">
                                ${data.status_distribution.map(s => `
                                    <div class="flex justify-between text-sm">
                                        <span>${s.status}</span>
                                        <span class="font-medium">${s.count}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Charts -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                        <div class="bg-white rounded-lg shadow p-4">
                            <h2 class="text-lg font-bold mb-4">Incidents by Type</h2>
                            <canvas id="typeChart" height="200"></canvas>
                        </div>
                        <div class="bg-white rounded-lg shadow p-4">
                            <h2 class="text-lg font-bold mb-4">Daily Incidents</h2>
                            <canvas id="dailyChart" height="200"></canvas>
                        </div>
                    </div>
                `;

                // Render charts
                setTimeout(() => {
                    if (data.incidents_by_type.length > 0) {
                        new Chart(document.getElementById('typeChart'), {
                            type: 'doughnut',
                            data: {
                                labels: data.incidents_by_type.map(t => t.name || 'Unknown'),
                                datasets: [{ data: data.incidents_by_type.map(t => t.count) }]
                            }
                        });
                    }

                    if (data.daily_incidents.length > 0) {
                        new Chart(document.getElementById('dailyChart'), {
                            type: 'line',
                            data: {
                                labels: data.daily_incidents.map(d => d.date),
                                datasets: [{ label: 'Incidents', data: data.daily_incidents.map(d => d.count), borderColor: '#10b981', tension: 0.3 }]
                            },
                            options: { scales: { y: { beginAtZero: true } } }
                        });
                    }
                }, 100);

            } catch (error) {
                main.innerHTML = '<p class="text-red-500">Error: ' + error.message + '</p>';
            }
        }

        async function loadAuditLogs() {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></div>';

            try {
                const response = await fetch('api/admin.php?action=audit', {
                    headers: { 'Authorization': token }
                });
                const result = await response.json();

                if (!result.success) {
                    main.innerHTML = '<p class="text-red-500">Failed to load audit logs</p>';
                    return;
                }

                const logs = result.data;

                main.innerHTML = `
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">Audit Logs</h1>
                        <p class="text-gray-600">System activity history</p>
                    </div>

                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="text-left py-3 px-4">User</th>
                                    <th class="text-left py-3 px-4">Action</th>
                                    <th class="text-left py-3 px-4">Description</th>
                                    <th class="text-left py-3 px-4">IP Address</th>
                                    <th class="text-left py-3 px-4">Date/Time</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${logs.length > 0 ? logs.map(l => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="py-3 px-4">${l.user_name || 'System'}</td>
                                        <td class="py-3 px-4">
                                            <span class="px-2 py-1 rounded text-xs bg-gray-100 font-mono">${l.action}</span>
                                        </td>
                                        <td class="py-3 px-4 text-gray-600">${l.description || ''}</td>
                                        <td class="py-3 px-4 text-gray-500">${l.ip_address || ''}</td>
                                        <td class="py-3 px-4 text-gray-500">${new Date(l.created_at).toLocaleString()}</td>
                                    </tr>
                                `).join('') : '<tr><td colspan="5" class="py-8 text-center text-gray-500">No logs found</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                main.innerHTML = '<p class="text-red-500">Error: ' + error.message + '</p>';
            }
        }

        function viewRequest(id) {
            alert('View request #' + id + ' - Feature coming soon!');
        }

        // Helper functions
        function getStatusClass(status) {
            const classes = {
                'pending': 'bg-yellow-100 text-yellow-800',
                'accepted': 'bg-blue-100 text-blue-800',
                'responding': 'bg-purple-100 text-purple-800',
                'arrived': 'bg-green-100 text-green-800',
                'completed': 'bg-gray-100 text-gray-800',
                'cancelled': 'bg-red-100 text-red-800'
            };
            return classes[status] || 'bg-gray-100';
        }

        function getUserTypeClass(type) {
            const classes = {
                'admin': 'bg-red-100 text-red-800',
                'dispatcher': 'bg-purple-100 text-purple-800',
                'responder': 'bg-blue-100 text-blue-800',
                'user': 'bg-gray-100 text-gray-800'
            };
            return classes[type] || 'bg-gray-100';
        }

        function getResponderStatusClass(status) {
            const classes = {
                'available': 'bg-green-100 text-green-800',
                'busy': 'bg-red-100 text-red-800',
                'offline': 'bg-gray-100 text-gray-800',
                'on_duty': 'bg-blue-100 text-blue-800'
            };
            return classes[status] || 'bg-gray-100';
        }
    </script>
</body>
</html>
